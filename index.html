CREATE TABLE IF NOT EXISTS blueprints (
  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
  user_id UUID REFERENCES auth.users NOT NULL,
  name TEXT NOT NULL,
  thumbnail TEXT NOT NULL,
  cropped_image TEXT NOT NULL,
  rows INT NOT NULL,
  cols INT NOT NULL,
  crop_data JSONB NOT NULL DEFAULT '{}',
  cell_width INT NOT NULL DEFAULT 20,
  cell_height INT NOT NULL DEFAULT 20,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- 创建项目表
CREATE TABLE IF NOT EXISTS projects (
  id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
  user_id UUID REFERENCES auth.users NOT NULL,
  name TEXT NOT NULL,
  thumbnail TEXT NOT NULL,
  cropped_image TEXT NOT NULL,
  rows INT NOT NULL,
  cols INT NOT NULL,
  crop_data JSONB NOT NULL DEFAULT '{}',
  cell_width INT NOT NULL DEFAULT 20,
  cell_height INT NOT NULL DEFAULT 20,
  current_row INT NOT NULL DEFAULT 1,
  is_completed BOOLEAN NOT NULL DEFAULT FALSE,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  updated_at TIMESTAMPTZ DEFAULT NOW()
);

-- 为 upsert 添加唯一约束（必须执行此步骤才能正常使用云同步）
ALTER TABLE blueprints
  DROP CONSTRAINT IF EXISTS blueprints_user_id_name_key;
ALTER TABLE blueprints
  ADD CONSTRAINT blueprints_user_id_name_key UNIQUE (user_id, name);

ALTER TABLE projects
  DROP CONSTRAINT IF EXISTS projects_user_id_name_key;
ALTER TABLE projects
  ADD CONSTRAINT projects_user_id_name_key UNIQUE (user_id, name);

-- 启用行级安全策略
ALTER TABLE blueprints ENABLE ROW LEVEL SECURITY;
ALTER TABLE projects ENABLE ROW LEVEL SECURITY;
